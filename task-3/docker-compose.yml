# AI Challenge 2.0 · Task 3 — n8n + Postgres stack
#
# Self-hosted n8n with Postgres persistence + Telegram bot integration.
# Telegram webhook is exposed via Cloudflare Tunnel (configured separately —
# see task-3/README.md "Tunnel setup"). The tunnel forwards public HTTPS
# to n8n:5678 inside this compose network.
#
# Ports chosen per project convention (CLAUDE.md §7):
#   - n8n      → 5678 (n8n default)
#   - Postgres → 5433 on host (5432 inside container) to avoid clashing
#                with any work-project Postgres on the default port

name: task-3

services:
  postgres:
    image: postgres:18-alpine
    container_name: task3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    container_name: task3-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database — n8n's own metadata storage
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}

      # Encryption — protects credentials in n8n's DB
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY must be set in .env}

      # Public-facing URL — Cloudflare Tunnel hostname.
      # Telegram webhook will be registered against ${N8N_WEBHOOK_URL}/webhook/<id>.
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:?N8N_WEBHOOK_URL must be set in .env}
      N8N_EDITOR_BASE_URL: ${N8N_WEBHOOK_URL:?N8N_WEBHOOK_URL must be set in .env}

      # Sane defaults
      GENERIC_TIMEZONE: ${TZ:-Asia/Tashkent}
      TZ: ${TZ:-Asia/Tashkent}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"

      # API access — own Anthropic key for Teacher/Examiner roles
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set in .env}

      # Telegram — token only; webhook is registered by n8n on workflow activation
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN must be set in .env}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/import/workflows:ro

volumes:
  postgres_data:
    name: task3-postgres-data
  n8n_data:
    name: task3-n8n-data
