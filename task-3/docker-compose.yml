# AI Challenge 2.0 · Task 3 — n8n + Postgres + ngrok stack
#
# Self-hosted n8n with Postgres persistence + ngrok tunnel for Telegram
# webhook. One `docker compose up -d` brings up everything.
#
# Port mapping (host → container):
#   - n8n      → 5679:5678  (host 5679 because 5678 is taken on this dev box
#                            by another project's n8n; container stays on
#                            n8n default 5678)
#   - Postgres → 5434:5432  (host 5434 because 5433 is taken on this dev box;
#                            container stays on Postgres default 5432)
#   - ngrok    → no host port needed — ngrok talks to n8n over the compose
#                network (`n8n:5678`) and exposes via the reserved public
#                URL ${NGROK_DOMAIN}
#
# The reserved ngrok subdomain ${NGROK_DOMAIN} is the public HTTPS URL
# Telegram will hit; n8n's Telegram Trigger node registers the webhook
# against ${N8N_WEBHOOK_URL} on workflow activation.

name: task-3

services:
  postgres:
    image: postgres:18-alpine
    container_name: task3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    container_name: task3-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database — n8n's own metadata storage
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}

      # Encryption — protects credentials in n8n's DB
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY must be set in .env}

      # Public-facing URL — ngrok hostname.
      # Telegram webhook will be registered against ${N8N_WEBHOOK_URL}/webhook/<path>.
      N8N_HOST: ${N8N_HOST:?N8N_HOST must be set in .env}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:?N8N_WEBHOOK_URL must be set in .env}
      N8N_EDITOR_BASE_URL: ${N8N_WEBHOOK_URL:?N8N_WEBHOOK_URL must be set in .env}

      # Trust the ngrok proxy (n8n needs to honour X-Forwarded-* headers
      # to construct correct webhook URLs and cookie security flags).
      N8N_PROXY_HOPS: 1

      # Sane defaults
      GENERIC_TIMEZONE: ${TZ:-Asia/Tashkent}
      TZ: ${TZ:-Asia/Tashkent}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"

      # API access — own Anthropic key for Teacher/Examiner roles.
      # Surfaced to workflows via $env() expressions; not stored in n8n
      # credentials DB (those use N8N_ENCRYPTION_KEY at rest).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set in .env}

      # Telegram bot token — available to Code nodes via $env().
      # The Telegram Trigger / sendMessage nodes use credentials in n8n DB,
      # but Code nodes that call setMyCommands etc. need the raw token.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN must be set in .env}
    ports:
      - "5679:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  ngrok:
    image: ngrok/ngrok:latest
    container_name: task3-ngrok
    restart: unless-stopped
    depends_on:
      - n8n
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?NGROK_AUTHTOKEN must be set in .env}
    # Reserved subdomain ${NGROK_DOMAIN} (e.g. seniorprepcoach.ngrok.dev)
    # → forwards to n8n service on internal port 5678 over the compose network.
    command:
      - "http"
      - "--url=${NGROK_DOMAIN}"
      - "n8n:5678"

volumes:
  postgres_data:
    name: task3-postgres-data
  n8n_data:
    name: task3-n8n-data
